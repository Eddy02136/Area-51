version: '3'

services:
  server:
    build: './back-end'
    depends_on:
      - mongo_db
    ports:
      - "8080:8080"
    networks:
      - back-end
    environment:
      - MONGO_URI=mongodb://mongo_db:27017/mydatabase

  client_web:
    build: './front-end'
    depends_on:
      # - client_mobile
      - server
    ports:
      - "8081:8081"
    volumes:
      - apk:/mobile_app/

  client_mobile:
    build: './mobile-app'
    volumes:
      - apk:/mobile_app/

  mongo_db:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

networks:
  back-end:

volumes:
  mongo-data:
  apk: