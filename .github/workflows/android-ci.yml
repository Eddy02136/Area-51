name: Android CI Pipeline

on:
  push:
    branches:
      - mobile-app
  pull_request:
    branches:
      - mobile-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK 11
      uses: actions/setup-java@v1
      with:
        java-version: '11'

    - name: Cache Gradle dependencies
      uses: actions/cache@v2
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle

    - name: Build the project
      run: cd mobile-app/project && ./gradlew assembleDebug

    - name: Run Unit Tests
      run: cd mobile-app/project && ./gradlew test

    - name: Run Lint
      run: cd mobile-app/project && ./gradlew lint

    - name: Run Instrumented Tests on Firebase Test Lab
      run: |
        gcloud firebase test android run \
        --type instrumentation \
        --app mobile-app/project/app/build/outputs/apk/debug/app-debug.apk \
        --test mobile-app/project/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
        --device model=Pixel2,version=30

    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: app-debug.apk
        path: mobile-app/project/app/build/outputs/apk/debug/app-debug.apk
